name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version/Tag to deploy'
        required: true
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }}

      - name: Deploy to staging server (placeholder)
        run: |
          echo "Deploying version ${{ github.event.inputs.version }} to staging"
          # In production, this would SSH to the staging server and run:
          # docker-compose -f docker-compose.yml -f docker-compose.prod.yml down
          # docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull
          # docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # Wait for services to be ready
          sleep 30

          # Test API health
          curl -f http://localhost:8000/api/health || exit 1

          echo "Smoke tests passed!"

      - name: Notify deployment
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deployed to staging: ${{ github.event.inputs.version }}'
            })

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Staging deployment failed for ${{ github.event.inputs.version }}'
            })
