# render.yaml — NETA.AI Infrastructure Blueprint
#
# Deploy with: Connect repo at render.com → New → Blueprint
# All services defined here. Secrets marked sync:false must be filled in the dashboard.
#
# Services:
#   neta-api           Web Service  (FastAPI, port $PORT)
#   neta-celery-worker Background Worker
#   neta-celery-beat   Background Worker (scheduler)
#   neta-frontend      Static Site  (React build)
#   neta-redis         Redis instance
#
# Databases (managed):
#   neta-postgres      PostgreSQL 15 with PostGIS
#
# NOTE: All services on free tier. neta-api spins down after 15 min inactivity.
# neta-postgres expires after 90 days. Upgrade plans for production use.

databases:
  - name: neta-postgres
    plan: free
    databaseName: netaai_prod
    user: netaai_app
    postgresMajorVersion: 15
    region: oregon

services:
  # ── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: neta-redis
    plan: free
    maxmemoryPolicy: noeviction
    region: oregon
    ipAllowList: []

  # ── API (FastAPI) ────────────────────────────────────────────────────────────
  - type: web
    name: neta-api
    env: docker
    dockerfilePath: ./Dockerfile.render
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neta-postgres
          property: connectionString
      - key: POSTGRES_USER
        value: netaai_app
      - key: POSTGRES_DB
        value: netaai_prod
      - key: REDIS_URL
        fromService:
          name: neta-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: neta-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: neta-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: neta-postgres
          property: password
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SERVICE_TYPE
        value: web
      - key: RUN_MIGRATIONS
        value: "true"
      - key: ALLOWED_ORIGINS
        value: '["https://neta-frontend.onrender.com","https://app.netaai.in"]'
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ENABLED
        value: "true"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: neta-celery-worker
    env: docker
    dockerfilePath: ./Dockerfile.render
    region: oregon
    plan: free
    dockerCommand: celery -A celeryconfig worker --loglevel=info --queues=alerts,notifications,monitoring,maintenance,default --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neta-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: neta-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: neta-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: neta-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PYTHONPATH
        value: /app
      - key: SERVICE_TYPE
        value: worker
      - key: RUN_MIGRATIONS
        value: "false"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ENABLED
        value: "true"
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false

  # ── Celery Beat (scheduler) ──────────────────────────────────────────────────
  - type: worker
    name: neta-celery-beat
    env: docker
    dockerfilePath: ./Dockerfile.render
    region: oregon
    plan: free
    dockerCommand: celery -A celeryconfig beat --loglevel=info --scheduler celery.beat:PersistentScheduler --schedule /tmp/celerybeat-schedule
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neta-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: neta-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: neta-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: neta-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PYTHONPATH
        value: /app
      - key: SERVICE_TYPE
        value: beat
      - key: RUN_MIGRATIONS
        value: "false"

  # ── Frontend (React Static Site) ─────────────────────────────────────────────
  - type: web
    name: neta-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false
