apiVersion: apps/v1
kind: Deployment
metadata:
  name: neta-celery-worker
  namespace: neta-ai
  labels:
    app: neta-celery-worker
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: neta-celery-worker
  template:
    metadata:
      labels:
        app: neta-celery-worker
        version: v1
    spec:
      serviceAccountName: neta-celery-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: celery-worker
        image: ghcr.io/your-org/neta-ai:latest
        imagePullPolicy: Always
        command:
        - celery
        - -A
        - app.whatsapp_integration.celery_tasks
        - worker
        - --loglevel=info
        - --queues=alerts,notifications,monitoring,maintenance
        - --concurrency=8
        - --max-tasks-per-child=100
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DEBUG
          value: "false"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: neta-secrets
              key: database-url
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: neta-secrets
              key: celery-broker-url
        - name: CELERY_RESULT_BACKEND
          valueFrom:
            secretKeyRef:
              name: neta-secrets
              key: celery-result-backend
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: neta-secrets
              key: redis-url
        - name: WHATSAPP_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: neta-secrets
              key: whatsapp-api-token
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - celery
            - -A
            - app.whatsapp_integration.celery_tasks
            - inspect
            - ping
          initialDelaySeconds: 60
          periodSeconds: 60
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
        volumeMounts:
        - name: worker-logs
          mountPath: /app/logs
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - neta-celery-worker
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: dedicated
                operator: In
                values:
                - celery
      terminationGracePeriodSeconds: 30
      volumes:
      - name: worker-logs
        emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: neta-celery-worker
  namespace: neta-ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neta-celery-worker
  namespace: neta-ai
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
