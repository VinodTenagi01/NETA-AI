# Kubernetes Secret Template for NETA AI
# IMPORTANT: Never commit actual secrets to Git
#
# To create this secret from AWS Secrets Manager:
# aws secretsmanager get-secret-value --secret-id neta-ai/production | \
#   jq -r '.SecretString' | kubectl create secret generic neta-secrets --from-file=/dev/stdin
#
# Or manually create with sensitive values:
# kubectl create secret generic neta-secrets \
#   --from-literal=database-url='postgresql+asyncpg://...' \
#   --from-literal=redis-url='redis://:password@...' \
#   --from-literal=secret-key='...' \
#   -n neta-ai
#
# To update existing secret:
# kubectl delete secret neta-secrets -n neta-ai
# kubectl create secret generic neta-secrets \
#   --from-literal=database-url='...' \
#   ... (all values)
#   -n neta-ai

apiVersion: v1
kind: Secret
metadata:
  name: neta-secrets
  namespace: neta-ai
  labels:
    app: neta
    managed-by: secrets-manager
type: Opaque
stringData:
  # PostgreSQL Database
  postgres-password: "CHANGE_ME_SECURE_PASSWORD"
  database-url: "postgresql+asyncpg://netaai_app:PASSWORD@postgres:5432/netaai_prod"

  # Redis
  redis-password: "CHANGE_ME_SECURE_PASSWORD"
  redis-url: "redis://:PASSWORD@redis:6379/0"

  # Application Secrets
  secret-key: "CHANGE_ME_WITH_CRYPTOGRAPHICALLY_SECURE_KEY"
  jwt-secret: "CHANGE_ME_WITH_JWT_SIGNING_KEY"

  # WhatsApp Integration
  whatsapp-api-token: "CHANGE_ME_META_WHATSAPP_API_TOKEN"
  whatsapp-phone-id: "CHANGE_ME_PHONE_NUMBER_ID"
  whatsapp-business-account-id: "CHANGE_ME_BUSINESS_ACCOUNT_ID"
  whatsapp-webhook-verify-token: "CHANGE_ME_WEBHOOK_VERIFY_TOKEN"

  # Celery Configuration
  celery-broker-url: "redis://:PASSWORD@redis:6379/0"
  celery-result-backend: "redis://:PASSWORD@redis:6379/1"

  # AWS Credentials (for backups)
  aws-access-key-id: "CHANGE_ME_AWS_ACCESS_KEY"
  aws-secret-access-key: "CHANGE_ME_AWS_SECRET_KEY"
  aws-s3-bucket: "neta-ai-backups"
  aws-s3-region: "us-east-1"

  # Google Cloud (for backups)
  gcs-bucket: "neta-ai-backups"
  gcs-service-account: "CHANGE_ME_GCS_SERVICE_ACCOUNT_JSON"

  # Logging & Monitoring
  log-aggregation-token: "CHANGE_ME_ELK_API_TOKEN"
  datadog-api-key: "CHANGE_ME_DATADOG_API_KEY"
  pagerduty-integration-key: "CHANGE_ME_PAGERDUTY_KEY"

  # Email Configuration (for notifications)
  smtp-host: "smtp.gmail.com"
  smtp-port: "587"
  smtp-user: "CHANGE_ME_EMAIL"
  smtp-password: "CHANGE_ME_APP_PASSWORD"
  smtp-from-address: "noreply@netaai.in"

  # SSL/TLS Certificates (if using self-signed)
  tls-crt: "CHANGE_ME_BASE64_ENCODED_CERTIFICATE"
  tls-key: "CHANGE_ME_BASE64_ENCODED_KEY"

---
# External Secrets Operator Integration (Optional)
# Use this if you want automatic secret synchronization from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: neta-ai
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: neta-secrets-from-aws
  namespace: neta-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: neta-secrets
    creationPolicy: Owner
  data:
  - secretKey: database-url
    remoteRef:
      key: neta-ai/production
      property: database_url
  - secretKey: redis-url
    remoteRef:
      key: neta-ai/production
      property: redis_url
  - secretKey: secret-key
    remoteRef:
      key: neta-ai/production
      property: secret_key
  - secretKey: whatsapp-api-token
    remoteRef:
      key: neta-ai/production
      property: whatsapp_api_token
  - secretKey: whatsapp-phone-id
    remoteRef:
      key: neta-ai/production
      property: whatsapp_phone_id
  - secretKey: whatsapp-business-account-id
    remoteRef:
      key: neta-ai/production
      property: whatsapp_business_account_id
  - secretKey: whatsapp-webhook-verify-token
    remoteRef:
      key: neta-ai/production
      property: whatsapp_webhook_verify_token
  - secretKey: celery-broker-url
    remoteRef:
      key: neta-ai/production
      property: celery_broker_url
  - secretKey: celery-result-backend
    remoteRef:
      key: neta-ai/production
      property: celery_result_backend
  - secretKey: postgres-password
    remoteRef:
      key: neta-ai/production
      property: postgres_password
  - secretKey: aws-access-key-id
    remoteRef:
      key: neta-ai/production
      property: aws_access_key_id
  - secretKey: aws-secret-access-key
    remoteRef:
      key: neta-ai/production
      property: aws_secret_access_key
